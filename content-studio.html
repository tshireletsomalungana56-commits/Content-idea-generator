      font-weight: 700;

      -webkit-text-fill-color: transparent;
      background-clip: text;

      line-height: 1.6;
      max-width: 460px;
      margin: 0 auto;
    }

    .control-label {

      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
      margin-bottom: 10px;
    }

    .control-spacer { margin-bottom: 20px; }

      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 8px 20px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;

      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;

      color: #60A5FA;

      padding: 10px 20px;

      font-weight: 800;

      margin-bottom: 32px;
      box-shadow: 0 8px 40px rgba(184,146,74,0.28);
      transition: all 0.25s;

      background: rgba(184,146,74,0.15);
      color: var(--gold);
      cursor: not-allowed;
      box-shadow: none;
      transform: scale(0.99);

      padding: 14px 18px;
      margin-bottom: 24px;
      color: #FCA5A5;
      font-size: 14px;

      font-size: 11px;
      font-family: 'DM Mono', monospace;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;

</head>

    niche:'accounting_study',
    hooks:["80% in FAC. Here's what that student did differently.","Our tutor helped a student get into CTA — this is how it happened","Real result from one of our AccSciHQ tutoring students"],
    talking:"Walk through the specific study approach a successful student used — targeted weak topics, timed practice, confidence tracking. Make it concrete. The method is the message, AccSciHQ is the vehicle.",
    shoot:"Seated, relaxed, talking like you're recapping a conversation. Hold your phone like you're referencing a message. Keep it personal and conversational.",
    cta:"Book a tutor at AccSciHQ — link in bio ✦",
    purpose:'soft', effort:'quick',
  },
];

const TRENDING_STATIC = {
  accounting_study:   ["CTA exam season prep","BCom to Honours transition","SAICA APC qualifying exam","How to survive articles","FAC exam strategies","IFRS 16 explained simply","Management accounting careers","Accounting internship advice","Study smarter not harder","First year accounting struggles"],
  corporate_life:     ["Gen Z in the workplace","Quiet quitting reality check","Big 4 vs boutique firms","Setting boundaries at work","First year corporate lessons","Side hustle while employed","How to get promoted faster","Work from home vs office","Salary transparency movement","Corporate politics is real"],
  personal_lifestyle: ["Building in public","Quarter life crisis","Honest 20s life content","Morning routines that actually work","Money mindset for young professionals","Imposter syndrome in your first job","Self-improvement without hustle toxicity","Doing too much and loving it"],
};

const NICHE_META = {
  accounting_study:   { label:'Accounting & Study',   emoji:'📊', color:'#F59E0B', bg:'rgba(245,158,11,0.12)' },
  corporate_life:     { label:'Corporate Life',        emoji:'💼', color:'#60A5FA', bg:'rgba(96,165,250,0.12)' },
  personal_lifestyle: { label:'Personal & Lifestyle',  emoji:'✨', color:'#C084FC', bg:'rgba(192,132,252,0.12)' },
};

const PURPOSE_META = {
  direct: { label:'AccSciHQ Push',   color:'#F59E0B', bg:'rgba(245,158,11,0.1)',  desc:'Directly promotes the business' },
  growth: { label:'Audience Growth', color:'#60A5FA', bg:'rgba(96,165,250,0.1)',  desc:'Builds reach and new followers' },
  soft:   { label:'Soft Conversion', color:'#34D399', bg:'rgba(52,211,153,0.1)',  desc:'Builds trust, hints at AccSciHQ' },
};

const EFFORT_META = {
  quick:  { label:'Quick — 30 min',   icon:'⚡' },
  medium: { label:'Medium — 1–2 hrs', icon:'🎬' },
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function platformTip(p) {
  if (p === 'tiktok') return 'TikTok: hook in 1–2 sec, raw and real, comment bait boosts the algorithm';
  if (p === 'reels')  return 'Reels: slightly more polished, strong caption, CTA in video AND caption';
  return 'Both: film once, post natively to each — tweak the caption per platform, don\'t just cross-post';
}

function generateQuick() {
  const tip = platformTip(platform);
  return [
    { ...rand(POOL_ACCSCIHQ), tip },
    { ...rand(POOL_GROWTH),   tip },
    { ...rand(POOL_SOFT),     tip },
  ].map(idea => ({
    ...idea,
    selectedHook: rand(idea.hooks),
    trending: rand(TRENDING_STATIC[idea.niche]),
  }));
}

async function generateDeep() {
  const tip = platformTip(platform);
  const prompt = `You are a content strategist for AccSciHQ, a South African accounting education brand run by a 23-year-old audit trainee writing APC. The brand has: a marks tracker app (R189/semester, free 7-day trial), CTA topic study guides sold on Payhip, and a tutoring service. The founder posts on TikTok and Instagram Reels across 3 niches: (1) accounting and study content for all accounting students not just CTA, (2) broad corporate life and young professional content not just accounting-specific, (3) personal lifestyle and building in public.

Search for what is genuinely trending RIGHT NOW in: South African accounting student content, young professional and corporate life content on TikTok/Reels, and personal finance or building-in-public lifestyle content.

Then generate exactly 3 short-form video ideas. One must directly push AccSciHQ (purpose: direct). One must be pure audience growth (purpose: growth). One must softly convert by building trust (purpose: soft).

Return ONLY a valid JSON array of 3 objects, each with these exact keys:
niche (one of: accounting_study, corporate_life, personal_lifestyle),
purpose (one of: direct, growth, soft),
hook (punchy opening hook under 12 words),
hook2 (alternative hook),
hook3 (another alternative hook),
talking (2-3 sentences on what to say, specific not generic),
shoot (how to shoot it — location, setup, energy, duration),
cta (exact words to end with),
trending (one specific trending topic or conversation happening RIGHT NOW that this taps into),
effort (quick or medium).

No markdown. No explanation. Just the raw JSON array.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: prompt }],
    }),
  });

  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  const clean = text.replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(clean);

  return parsed.map(idea => ({
    niche:    idea.niche,
    hooks:    [idea.hook, idea.hook2, idea.hook3].filter(Boolean),
    talking:  idea.talking,
    shoot:    idea.shoot,
    cta:      idea.cta,
    purpose:  idea.purpose,
    effort:   idea.effort || 'quick',
    selectedHook: idea.hook,
    trending: idea.trending,
    tip,
  }));
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function renderIdeas(ideas) {
  const today = new Date().toLocaleDateString('en-ZA', { weekday:'long', day:'numeric', month:'long' });
  const modeLabel = mode === 'deep' ? 'Deep Research' : 'Quick Mode';

  const out = document.getElementById('output');
  out.innerHTML = `
    <div class="divider" id="divider">
      <div class="divider-line"></div>
      <div class="divider-text">${today} · ${modeLabel}</div>
      <div class="divider-line"></div>
    </div>
    ${ideas.map((idea, i) => renderCard(idea, i)).join('')}
    <p class="footer-note" id="footer-note">Done beats perfect. Pick one and press record. ✦</p>
  `;

  // Animate in
  requestAnimationFrame(() => {
    document.getElementById('divider')?.classList.add('show');
    document.querySelectorAll('.idea-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 180 + 80);
    });
    setTimeout(() => {
      document.getElementById('footer-note')?.classList.add('show');
    }, 700);
  });

  // Hook tab interactivity
  document.querySelectorAll('.hook-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const card = tab.closest('.idea-card');
      const idx  = parseInt(tab.dataset.idx);
      card.querySelectorAll('.hook-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      card.querySelector('.hook-text').textContent = `"${ideas[parseInt(tab.dataset.card)].hooks[idx]}"`;
    });
  });
}

function renderCard(idea, cardIdx) {
  const niche   = NICHE_META[idea.niche]    || NICHE_META.personal_lifestyle;
  const purpose = PURPOSE_META[idea.purpose] || PURPOSE_META.growth;
  const effort  = EFFORT_META[idea.effort]   || EFFORT_META.quick;

  const hookTabs = idea.hooks.map((h, i) =>
    `<button class="hook-tab ${i===0?'active':''}" data-card="${cardIdx}" data-idx="${i}">Hook ${i+1}</button>`
  ).join('');

  return `
  <div class="idea-card" style="--niche-color:${niche.color}">
    <div style="position:absolute;top:0;right:0;width:160px;height:160px;background:radial-gradient(circle at top right,${niche.color}18,transparent 65%);pointer-events:none;"></div>

    <div class="badges">
      <span class="badge" style="color:${niche.color};background:${niche.bg};border-color:${niche.color}30">${niche.emoji} ${niche.label}</span>
      <span class="badge" style="color:${purpose.color};background:${purpose.bg};border-color:${purpose.color}30">${purpose.label}</span>
      <span class="badge" style="color:#64748B;background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.08)">${effort.icon} ${effort.label}</span>
    </div>

    <div class="purpose-desc">Purpose: ${purpose.desc}</div>

    <div class="sec-label">🎣 Hook</div>
    <div class="hook-box">
      <div class="hook-text">"${idea.hooks[0]}"</div>
      <div class="hook-tabs">${hookTabs}</div>
    </div>

    <div class="two-col">
      <div>
        <div class="sec-label">💬 What to cover</div>
        <div class="info-box">${idea.talking}</div>
      </div>
      <div>
        <div class="sec-label">🎥 How to shoot it</div>
        <div class="info-box">${idea.shoot}</div>
      </div>
    </div>

    <div class="trending-row">
      <span class="trending-label">🔍 TRENDING ANGLE</span>
      <span class="trending-value">${idea.trending}</span>
    </div>

    <div class="platform-row">
      <span class="platform-label">📱 PLATFORM</span>
      <span class="platform-value">${idea.tip}</span>
    </div>

    <div class="cta-row">
      <span class="cta-label">END WITH</span>
      <span class="cta-value">"${idea.cta}"</span>
    </div>
  </div>`;
}

// ─── CONTROLS ─────────────────────────────────────────────────────────────────
document.querySelectorAll('[data-group="platform"]').forEach(btn => {
  btn.addEventListener('click', () => {
    platform = btn.dataset.val;
    document.querySelectorAll('[data-group="platform"]').forEach(b => b.classList.remove('active-gold'));
    btn.classList.add('active-gold');
  });
});

document.querySelectorAll('[data-group="mode"]').forEach(btn => {
  btn.addEventListener('click', () => {
    mode = btn.dataset.val;
    document.querySelectorAll('[data-group="mode"]').forEach(b => b.classList.remove('active-blue'));
    btn.classList.add('active-blue');
  });
});

// ─── LOADING MESSAGES ─────────────────────────────────────────────────────────
const LOAD_STEPS = [
  "Searching what's trending in accounting content...",
  "Scanning corporate & young professional spaces...",
  "Checking lifestyle and building-in-public trends...",
  "Crafting your 3 ideas with the right ratio...",
];
let loadInterval = null;

function startLoading() {
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('output').innerHTML = '';

  if (mode === 'deep') {
    let step = 0;
    btn.textContent = `🔍 ${LOAD_STEPS[0]}`;
    loadInterval = setInterval(() => {
      step = (step + 1) % LOAD_STEPS.length;
      btn.textContent = `🔍 ${LOAD_STEPS[step]}`;
    }, 2200);
  } else {
    btn.textContent = '⟳  Generating...';
  }
}

function stopLoading(hasIdeas) {
  clearInterval(loadInterval);
  const btn = document.getElementById('gen-btn');
  btn.disabled = false;
  btn.textContent = hasIdeas ? '⟳  Fresh batch' : '✦  Generate my 3 ideas';
}

// ─── GENERATE ─────────────────────────────────────────────────────────────────
document.getElementById('gen-btn').addEventListener('click', async () => {
  startLoading();
  try {
    const ideas = mode === 'deep' ? await generateDeep() : generateQuick();
    renderIdeas(ideas);
    stopLoading(true);
  } catch(e) {
    console.error(e);
    const eb = document.getElementById('error-box');
    eb.textContent = 'Something went wrong in Deep Research mode. Try Quick mode or check your connection.';
    eb.style.display = 'block';
    stopLoading(false);
  }
});
</script>
</body>
</html>
